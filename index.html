<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owen's Applied Thinking — Ops</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e8e8;
  --text2: #999;
  --text3: #555;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --shipped: #1a3a1a;
  --shipped-text: #6fcf6f;
  --shipped-border: #2d5a2d;
  --progress: #1a2a3a;
  --progress-text: #6aaddf;
  --progress-border: #1e3d5a;
  --blocked: #3a1a1a;
  --blocked-text: #df6a6a;
  --blocked-border: #5a2020;
  --ready: #1a3a2a;
  --ready-text: #6fdfaa;
  --ready-border: #2a5a3a;
  --queued: #2a2a1a;
  --queued-text: #dfcf6a;
  --queued-border: #4a4a1a;
  --unknown: #1e1e1e;
  --unknown-text: #666;
  --unknown-border: #2a2a2a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.brand span{color:var(--text2)}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.token-wrap{display:flex;align-items:center;gap:6px}
.token-wrap label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
input[type=password]{background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:3px;width:220px;outline:none}
input[type=password]:focus{border-color:#444}
button{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:.04em;transition:all .15s}
button:hover{border-color:#555;color:var(--text)}
#summary{font-family:var(--mono);font-size:11px;color:var(--text3)}
#summary span{margin-right:10px}
main{padding:16px 20px}
.section{margin-bottom:20px}
.section-head{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.repo{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.b-shipped{background:var(--shipped);color:var(--shipped-text);border:1px solid var(--shipped-border)}
.b-progress{background:var(--progress);color:var(--progress-text);border:1px solid var(--progress-border)}
.b-blocked{background:var(--blocked);color:var(--blocked-text);border:1px solid var(--blocked-border)}
.b-ready{background:var(--ready);color:var(--ready-text);border:1px solid var(--ready-border)}
.b-queued{background:var(--queued);color:var(--queued-text);border:1px solid var(--queued-border)}
.b-unknown{background:var(--unknown);color:var(--unknown-text);border:1px solid var(--unknown-border)}
.next{font-size:11px;color:var(--text2);line-height:1.45;margin-top:2px}
.updated{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:7px}
.err{font-size:11px;color:var(--text3);font-style:italic;margin-top:3px}
.skel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
.skel-line{height:10px;border-radius:2px;background:var(--border2);margin-bottom:7px}
footer{border-top:1px solid var(--border);padding:10px 20px;font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;justify-content:space-between}
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">Owen's Applied Thinking — <span>Operations</span></div>
  </div>
  <div class="toolbar">
    <div class="token-wrap">
      <label>Token</label>
      <input type="password" id="tok" placeholder="ghp_...">
    </div>
    <button onclick="load()">Refresh ↻</button>
    <div id="summary"></div>
  </div>
</header>

<main id="main"></main>

<footer>
  <span>owencorpening.github.io/status</span>
  <span id="ts"></span>
</footer>

<script>
const OWNER = 'owencorpening';
const REPOS = [
  'ghost-tracker',
  'wraith',
  'cheatsheets-vscode',
  'citation-capture',
  'claude-drive-bridge',
  'reaper-react-bridge',
  'Reaper_InsertLyrics',
  'image-capture',
  'globe-with-time-knob',
  'songster',
  'status',
];

const TOK_KEY = 'owen_gh_tok';

function badgeClass(s) {
  if (!s) return 'b-unknown';
  const l = s.toLowerCase();
  if (l.includes('ready')) return 'b-ready';
  if (l.includes('ship')) return 'b-shipped';
  if (l.includes('progress') || l.includes('wip')) return 'b-progress';
  if (l.includes('block')) return 'b-blocked';
  if (l.includes('queue')) return 'b-queued';
  return 'b-unknown';
}

function parse(text) {
  let state = null, next = null, updated = null;
  for (const l of text.split('\n')) {
    const lc = l.toLowerCase();
    if (lc.includes('state:')) state = l.split(':').slice(1).join(':').trim().replace(/\*\*/g, '').trim();
    if (lc.includes('next action:')) next = l.split(':').slice(1).join(':').trim().replace(/\*\*/g, '').trim();
    if (lc.includes('last updated:')) updated = l.split(':').slice(1).join(':').trim().replace(/\*\*/g, '').trim();
  }
  return { state, next, updated };
}

function card({ repo, state, next, updated, error }) {
  const bc = badgeClass(state);
  return `<div class="card">
    <div class="card-top">
      <div class="repo" title="${repo}">${repo}</div>
      <span class="badge ${bc}">${state || '—'}</span>
    </div>
    ${next ? `<div class="next">${next}</div>` : ''}
    ${error ? `<div class="err">${error}</div>` : ''}
    ${updated ? `<div class="updated">${updated}</div>` : ''}
  </div>`;
}

function skel() {
  return REPOS.map(() => `<div class="skel"><div class="skel-line" style="width:50%"></div><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:30%"></div></div>`).join('');
}

async function fetchOne(repo, tok) {
  const h = { 'Accept': 'application/vnd.github.v3+json' };
  if (tok) h['Authorization'] = 'Bearer ' + tok;
  try {
    const r = await fetch(`https://api.github.com/repos/${OWNER}/${repo}/contents/CLAUDE.md`, { headers: h });
    if (!r.ok) return { repo, error: r.status === 404 ? 'No CLAUDE.md' : 'Error ' + r.status };
    const j = await r.json();
    const text = atob(j.content.replace(/\n/g, ''));
    const { state, next, updated } = parse(text);
    if (!state) return { repo, error: 'No status block' };
    return { repo, state, next, updated };
  } catch (e) {
    return { repo, error: 'Fetch failed' };
  }
}

const ORDER = ['Shipped', 'Ready to Ship', 'In Progress', 'Blocked', 'Queued', null];

function render(results) {
  const g = {};
  for (const c of results) {
    const k = c.state || null;
    if (!g[k]) g[k] = [];
    g[k].push(c);
  }
  let html = '';
  for (const grp of ORDER) {
    if (!g[grp]) continue;
    html += `<div class="section"><div class="section-head">${grp || 'No status'} <span style="color:var(--text3);font-size:9px">(${g[grp].length})</span></div><div class="grid">${g[grp].map(card).join('')}</div></div>`;
  }
  document.getElementById('main').innerHTML = html;

  const counts = {};
  for (const r of results) { const k = r.state || 'none'; counts[k] = (counts[k] || 0) + 1; }
  document.getElementById('summary').innerHTML = Object.entries(counts).map(([k, v]) => `<span>${v} ${k}</span>`).join('');
  document.getElementById('ts').textContent = 'refreshed ' + new Date().toLocaleTimeString();
}

async function load() {
  const tok = document.getElementById('tok').value.trim();
  if (tok) localStorage.setItem(TOK_KEY, tok);
  document.getElementById('main').innerHTML = `<div class="section"><div class="grid">${skel()}</div></div>`;
  document.getElementById('summary').textContent = 'loading…';
  const results = await Promise.all(REPOS.map(r => fetchOne(r, tok)));
  render(results);
}

const saved = localStorage.getItem(TOK_KEY);
if (saved) document.getElementById('tok').value = saved;

document.getElementById('tok').addEventListener('input', () => {
  const t = document.getElementById('tok').value.trim();
  if (t) localStorage.setItem(TOK_KEY, t);
  clearTimeout(window._tokTimer);
  window._tokTimer = setTimeout(load, 600);
});

load();
</script>
</body>
</html>
